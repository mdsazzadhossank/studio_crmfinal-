# ================================================
# Nginx Configuration for new.socialads.expert
# Studio Pro CRM
# ================================================
# এই কনফিগটি আপনার VPS-এ Nginx সার্ভার ব্লকে যোগ করুন।
# সাধারণত ফাইল লোকেশন:
#   /etc/nginx/sites-available/new.socialads.expert
#   অথবা /etc/nginx/conf.d/new.socialads.expert.conf
#
# যোগ করার পর:
#   sudo nginx -t          (টেস্ট করুন)
#   sudo systemctl reload nginx  (রিলোড করুন)
# ================================================

server {
    listen 80;
    listen [::]:80;
    server_name new.socialads.expert;

    # SSL redirect (যদি SSL সেটআপ থাকে)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.socialads.expert;

    # SSL Certificate paths (আপনার সার্টিফিকেট পাথ দিন)
    # Let's Encrypt হলে:
    ssl_certificate /etc/letsencrypt/live/new.socialads.expert/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.socialads.expert/privkey.pem;

    # Document Root — আপনার প্রজেক্ট যেখানে আপলোড করেছেন
    root /var/www/new.socialads.expert;
    index index.html index.php;

    # ── CORS Headers (MUST echo exact origin for credentials) ──
    # credentials:'include' requires specific origin, NOT wildcard *
    set $cors_origin $http_origin;
    if ($cors_origin = '') {
        set $cors_origin 'https://crm.devkazi.cloud';
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

    # ── Handle OPTIONS preflight ──
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
        add_header Access-Control-Max-Age 3600;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # ── Backend API: Route ALL /backend/api/* to index.php ──
    # This MUST handle .php URLs too (they are virtual routes, not real files)
    location /backend/api/ {
        try_files $uri $uri/ /backend/api/index.php?$query_string;

        # Process PHP within this location
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_index index.php;
            fastcgi_read_timeout 300;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }
    }

    # ── PHP Processing (for files OUTSIDE /backend/api/) ──
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;

        # PHP limits
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Upload size limit ──
    client_max_body_size 50M;

    # ── Backend uploads directory ──
    location /backend/uploads/ {
        alias /var/www/new.socialads.expert/backend/uploads/;
    }

    # ── Security: Block sensitive backend files ──
    location ~ /backend/(config|models|controllers|middleware|helpers|database)/ {
        deny all;
        return 403;
    }
    location ~ /backend/\.(env|sql|md|log)$ {
        deny all;
        return 403;
    }

    # ── React SPA: All other routes go to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip Compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Browser Caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Logging ──
    access_log /var/log/nginx/new.socialads.expert.access.log;
    error_log /var/log/nginx/new.socialads.expert.error.log;
}
